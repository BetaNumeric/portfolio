<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Project Placeholder</title>
  <desc id="desc">Placeholder artwork to replace when creating a new project page.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#2a2a2a" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect
    x="80"
    y="80"
    width="1440"
    height="740"
    rx="32"
    fill="none"
    stroke="#f5f5f5"
    stroke-dasharray="24 20"
    stroke-opacity="0.22"
    stroke-width="4"
  />
  <g fill="#f5f5f5" font-family="Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="362" font-size="58" font-weight="700" letter-spacing="8">PROJECT PLACEHOLDER</text>
    <text x="800" y="438" font-size="30" opacity="0.78">Replace this file with your hero image or preview media.</text>
    <text x="800" y="500" font-size="24" opacity="0.62">Suggested location: public/projects/your-project-name/</text>
  </g>
</svg>
